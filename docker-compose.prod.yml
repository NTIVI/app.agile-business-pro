# ============================================================
# Agile Business — Production (2 GB RAM, без Elasticsearch)
# Использование: docker compose -f docker-compose.prod.yml up -d
# Веб снаружи: Caddy на хосте (80/443) → reverse_proxy 127.0.0.1:8080
# ============================================================

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: agile_workspace
      POSTGRES_USER: agile_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agile_user -d agile_workspace"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env} --maxmemory 48mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:?Set MINIO_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?Set MINIO_PASSWORD in .env}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://agile_user:${DB_PASSWORD}@db:5432/agile_workspace
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_BUCKET: agile-files
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      ELASTICSEARCH_URL: ""
      DOMAIN: ${DOMAIN:-localhost}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-admin@agile.com}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-}
      WORKERS: "1"
      DEBUG: "false"
      REGISTRATION_AUTO_APPROVE: ${REGISTRATION_AUTO_APPROVE:-false}
      WEBSITE_WEBHOOK_SECRET: ${WEBSITE_WEBHOOK_SECRET:-}
    expose:
      - "8000"
    ports:
      # Только localhost: API снаружи — через Caddy/nginx фронта (/api/)
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 384M

  frontend:
    build:
      context: ./client-new
      dockerfile: Dockerfile
    restart: always
    # С Caddy на хосте: caddy слушает :80/:443, reverse_proxy → 127.0.0.1:8080
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M

  celery-worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    healthcheck:
      disable: true
    command: celery -A app.celery_app:celery worker --loglevel=info --concurrency=1
    environment:
      DATABASE_URL: postgresql+asyncpg://agile_user:${DB_PASSWORD}@db:5432/agile_workspace
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_USER}
      S3_SECRET_KEY: ${MINIO_PASSWORD}
      S3_BUCKET: agile-files
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256M

  celery-beat:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    healthcheck:
      disable: true
    command: celery -A app.celery_app:celery beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql+asyncpg://agile_user:${DB_PASSWORD}@db:5432/agile_workspace
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  minio_data:
