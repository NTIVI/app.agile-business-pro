# Вариант B: nginx на хосте + certbot, Docker frontend только на 127.0.0.1:8080.
# Внутри контейнера nginx уже проксирует /api/, /ws/, /files/.
#
# 1) Отключить Caddy (если ставили):  sudo systemctl disable --now caddy
# 2) map для WebSocket (если ещё нет в nginx.conf):
#    sudo cp nginx-ws-upgrade-map.conf /etc/nginx/snippets/agile-ws-upgrade-map.conf
#    В /etc/nginx/nginx.conf внутрь http { } добавить:  include /etc/nginx/snippets/agile-ws-upgrade-map.conf;
# 3) Включить сайт:
#    sudo cp nginx-docker-frontend.conf /etc/nginx/sites-available/app.agile-business-pro.com
#    sudo ln -sf /etc/nginx/sites-available/app.agile-business-pro.com /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
# 4) TLS:  sudo apt install -y certbot python3-certbot-nginx
#         sudo certbot --nginx -d app.agile-business-pro.com
#
# DNS A-запись домена должна указывать на этот сервер, иначе certbot не выдаст сертификат.

server {
    listen 80;
    listen [::]:80;
    server_name app.agile-business-pro.com;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
    }
}

# После certbot в этот же файл добавятся server { listen 443 ssl; ... } или расширят блок выше.
